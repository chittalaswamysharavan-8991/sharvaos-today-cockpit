<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SharvaOS Today Cockpit</title>

  <style>
    :root {
      --bg: #f6f8fd;
      --panel: rgba(255, 255, 255, 0.68);
      --panel-strong: rgba(255, 255, 255, 0.88);
      --line: rgba(41, 55, 85, 0.09);
      --text: #182235;
      --muted: #6b7280;
      --blue: #2563eb;
      --purple: #7c3aed;
      --green: #18c77a;
      --soft-green: rgba(24, 199, 122, 0.12);
      --shadow: 0 24px 70px rgba(33, 45, 72, 0.12);
      --inner: inset 0 1px 0 rgba(255, 255, 255, 0.86);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 12%, rgba(92, 124, 255, 0.10), transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(124, 58, 237, 0.10), transparent 28%),
        linear-gradient(145deg, #fbfcff, var(--bg));
      padding: 16px;
      overflow-x: hidden;
    }

    .cockpit {
      width: min(1120px, 100%);
      margin: 0 auto;
      border-radius: 34px;
      border: 1px solid rgba(255, 255, 255, 0.95);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.84), rgba(246, 249, 255, 0.62));
      box-shadow:
        var(--shadow),
        var(--inner);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      overflow: hidden;
      position: relative;
    }

    .cockpit::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 33px;
      border: 1px solid rgba(41, 88, 255, 0.06);
      pointer-events: none;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 22px;
    }

    .top-row {
      min-height: 84px;
    }

    .bottom-row {
      min-height: 72px;
      border-top: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.12));
    }

    .live-pill {
      height: 58px;
      min-width: 210px;
      padding: 0 26px;
      border-radius: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background:
        linear-gradient(145deg, rgba(214, 255, 235, 0.78), rgba(240, 255, 248, 0.72));
      border: 1px solid rgba(24, 199, 122, 0.18);
      box-shadow:
        0 12px 28px rgba(24, 199, 122, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      color: var(--green);
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .live-left {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(24, 199, 122, 0.12);
      flex: 0 0 auto;
    }

    .pulse {
      width: 46px;
      height: 22px;
      opacity: 0.45;
    }

    .metrics {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .metric {
      height: 58px;
      min-width: 128px;
      padding: 0 16px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow:
        0 10px 22px rgba(33, 45, 72, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.88);
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .metric:hover {
      transform: translateY(-1px);
      background: var(--panel-strong);
      box-shadow:
        0 15px 30px rgba(33, 45, 72, 0.09),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }

    .icon {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      color: var(--blue);
      flex: 0 0 auto;
    }

    .icon.purple {
      color: var(--purple);
    }

    .metric-text {
      min-width: 0;
      line-height: 1.05;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 950;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .metric-label {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .divider {
      width: 1px;
      height: 46px;
      background: var(--line);
      margin: 0 4px;
      flex: 0 0 auto;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .round-btn {
      width: 54px;
      height: 54px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--blue);
      display: grid;
      place-items: center;
      box-shadow:
        0 10px 22px rgba(33, 45, 72, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.88);
      cursor: pointer;
      text-decoration: none;
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .round-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.96);
      box-shadow:
        0 15px 30px rgba(33, 45, 72, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }

    .source-group {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .source-chip {
      height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid var(--line);
      color: #4b5563;
      font-size: 14px;
      font-weight: 750;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
      white-space: nowrap;
    }

    .source-chip .mini-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(24, 199, 122, 0.10);
    }

    .auto {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #8a91a3;
      font-size: 14px;
      white-space: nowrap;
    }

    .view-link {
      margin-left: 14px;
      padding-left: 18px;
      border-left: 1px solid var(--line);
      color: var(--blue);
      font-weight: 800;
      font-size: 15px;
      text-decoration: none;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .view-link:hover {
      text-decoration: underline;
    }

    .hidden-details {
      display: none;
    }

    .details-panel {
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.36);
      padding: 14px 22px 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .details-panel.active {
      display: block;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .details-card {
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 13px;
    }

    .details-title {
      color: var(--text);
      font-weight: 900;
      margin-bottom: 8px;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    @media (max-width: 920px) {
      .top-row {
        align-items: stretch;
        flex-direction: column;
      }

      .metrics {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
      }

      .metric {
        min-width: 0;
      }

      .divider {
        display: none;
      }

      .actions {
        align-self: flex-end;
      }

      .bottom-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .auto,
      .view-link {
        margin-left: 0;
      }

      .view-link {
        padding-left: 0;
        border-left: 0;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 10px;
      }

      .row {
        padding: 14px;
      }

      .live-pill {
        width: 100%;
        min-width: 0;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .metric {
        width: 100%;
      }

      .round-btn {
        width: 48px;
        height: 48px;
      }

      .details-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="cockpit" aria-label="SharvaOS Today Cockpit">
    <section class="row top-row">
      <div class="live-pill" id="livePill">
        <span class="live-left">
          <span class="status-dot"></span>
          <span id="liveText">LIVE</span>
        </span>

        <svg class="pulse" viewBox="0 0 80 36" fill="none" aria-hidden="true">
          <path d="M2 18H14L20 18L26 6L34 31L43 11L50 18H62L68 18L78 18" stroke="currentColor" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>

      <section class="metrics">
        <article class="metric" title="Events captured today">
          <div class="icon purple">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none">
              <path d="M13 2L4 14H11L10 22L20 9H13L13 2Z" stroke="currentColor" stroke-width="2.2"
                stroke-linejoin="round" />
            </svg>
          </div>
          <div class="metric-text">
            <div class="metric-value" id="eventsValue">—</div>
            <div class="metric-label">Events</div>
          </div>
        </article>

        <article class="metric" title="Updated components">
          <div class="icon">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none">
              <path d="M20 12A8 8 0 0 1 6.34 17.66M4 12A8 8 0 0 1 17.66 6.34" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" />
              <path d="M7 18H4V15M17 6H20V9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </div>
          <div class="metric-text">
            <div class="metric-value" id="updatedValue">—</div>
            <div class="metric-label">Updated</div>
          </div>
        </article>

        <article class="metric" title="System health">
          <div class="icon purple">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none">
              <path d="M12 21C12 21 20 17 20 10V5L12 2L4 5V10C4 17 12 21 12 21Z" stroke="currentColor"
                stroke-width="2.2" stroke-linejoin="round" />
              <path d="M8.5 12L10.8 14.3L15.8 9.3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </div>
          <div class="metric-text">
            <div class="metric-value" id="healthValue">—</div>
            <div class="metric-label">Health</div>
          </div>
        </article>

        <article class="metric" title="Owners or active systems">
          <div class="icon">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none">
              <path d="M16 11C17.66 11 19 9.66 19 8C19 6.34 17.66 5 16 5" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" />
              <path d="M8 11C9.66 11 11 9.66 11 8C11 6.34 9.66 5 8 5C6.34 5 5 6.34 5 8C5 9.66 6.34 11 8 11Z"
                stroke="currentColor" stroke-width="2.2" />
              <path d="M2.5 19C3.2 15.7 5.4 14 8 14C10.6 14 12.8 15.7 13.5 19" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" />
              <path d="M14.5 14.3C16.8 14.7 18.5 16.3 19.2 19" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" />
            </svg>
          </div>
          <div class="metric-text">
            <div class="metric-value" id="ownersValue">—</div>
            <div class="metric-label">Owners</div>
          </div>
        </article>
      </section>

      <div class="divider"></div>

      <section class="actions">
        <a class="round-btn" id="openLink" href="#" target="_blank" rel="noopener noreferrer" title="Open cockpit">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none">
            <path d="M14 4H20V10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
              stroke-linejoin="round" />
            <path d="M20 4L11 13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
            <path d="M10 6H6C4.9 6 4 6.9 4 8V18C4 19.1 4.9 20 6 20H16C17.1 20 18 19.1 18 18V14" stroke="currentColor"
              stroke-width="2.2" stroke-linecap="round" />
          </svg>
        </a>

        <button class="round-btn" id="runBtn" type="button" title="Run / refresh">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none">
            <path d="M8 5V19L19 12L8 5Z" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round" />
          </svg>
        </button>

        <button class="round-btn" id="moreBtn" type="button" title="More details">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none">
            <path d="M5 12H5.01M12 12H12.01M19 12H19.01" stroke="currentColor" stroke-width="3.2"
              stroke-linecap="round" />
          </svg>
        </button>
      </section>
    </section>

    <section class="row bottom-row">
      <section class="source-group" id="sourceGroup"></section>

      <div class="auto">
        <span>✦</span>
        <span id="autoText">Auto-updates daily</span>
      </div>

      <a class="view-link" id="viewCockpitLink" href="#" target="_blank" rel="noopener noreferrer">
        View cockpit
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
          <path d="M14 5H19V10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
            stroke-linejoin="round" />
          <path d="M19 5L10 14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
        </svg>
      </a>
    </section>

    <section class="details-panel hidden-details" id="detailsPanel">
      <div class="details-grid">
        <div class="details-card">
          <div class="details-title">Pending</div>
          <ul id="pendingList"></ul>
        </div>
        <div class="details-card">
          <div class="details-title">Sources</div>
          <ul id="sourceList"></ul>
        </div>
      </div>
    </section>
  </main>

  <script>
    const fallbackData = {
      schema_version: "3.0",
      component: "SharvaOS Today Cockpit",
      status: "missing",
      metrics: {
        events: 0,
        updated: 0,
        health: "0%",
        owners: 0
      },
      sources: {
        notion: "missing",
        html: "missing",
        git: "missing"
      },
      links: {
        cockpit: "https://sharvaos-today-cockpit.vercel.app",
        repo: "https://github.com/chittalaswamysharavan-8991/sharvaos-today-cockpit"
      },
      details: {
        pending_items: ["Restore today.json"],
        source_notes: ["Live data failed to load."]
      },
      auto_text: "Data missing"
    };

    const sourceLabels = {
      notion: "Notion",
      html: "HTML",
      git: "Git"
    };

    const statusMap = {
      fresh: "LIVE",
      pending: "PENDING",
      stale: "STALE",
      missing: "MISSING"
    };

    function normalizeStatus(value) {
      const status = String(value || "missing").toLowerCase();
      return ["fresh", "pending", "stale", "missing"].includes(status) ? status : "missing";
    }

    function sourceDot(status) {
      const clean = normalizeStatus(status);
      if (clean === "fresh") return "var(--green)";
      if (clean === "pending") return "#f59e0b";
      if (clean === "stale") return "#ef4444";
      return "#94a3b8";
    }

    function setText(id, value) {
      document.getElementById(id).textContent = value ?? "—";
    }

    function renderSources(sources = {}) {
      const group = document.getElementById("sourceGroup");

      group.innerHTML = Object.entries(sourceLabels).map(([key, label]) => {
        const status = normalizeStatus(sources[key]);
        return `
          <span class="source-chip" title="${label}: ${status}">
            <span>${label}</span>
            <span class="mini-dot" style="background:${sourceDot(status)}"></span>
          </span>
        `;
      }).join("");
    }

    function renderDetails(data) {
      const pending = data.details?.pending_items || [];
      const notes = data.details?.source_notes || [];

      document.getElementById("pendingList").innerHTML =
        pending.length ? pending.map(item => `<li>${item}</li>`).join("") : "<li>No pending items.</li>";

      document.getElementById("sourceList").innerHTML =
        notes.length ? notes.map(item => `<li>${item}</li>`).join("") : "<li>No source notes.</li>";
    }

    function render(data) {
      const status = normalizeStatus(data.status || data.overall_status);

      setText("liveText", statusMap[status] || "LIVE");
      setText("eventsValue", data.metrics?.events ?? data.today?.captured ?? 0);
      setText("updatedValue", data.metrics?.updated ?? 0);
      setText("healthValue", data.metrics?.health ?? "—");
      setText("ownersValue", data.metrics?.owners ?? 0);
      setText("autoText", data.auto_text || "Auto-updates daily");

      const cockpitUrl = data.links?.cockpit || data.links?.vercel || "https://sharvaos-today-cockpit.vercel.app";
      document.getElementById("openLink").href = cockpitUrl;
      document.getElementById("viewCockpitLink").href = cockpitUrl;

      renderSources(data.sources);
      renderDetails(data);
    }

    async function loadData() {
      try {
        const response = await fetch("./today.json", { cache: "no-store" });
        if (!response.ok) throw new Error("today.json failed");
        const data = await response.json();
        render(data);
      } catch (error) {
        render(fallbackData);
      }
    }

    document.getElementById("runBtn").addEventListener("click", loadData);

    document.getElementById("moreBtn").addEventListener("click", () => {
      const panel = document.getElementById("detailsPanel");
      panel.classList.toggle("hidden-details");
      panel.classList.toggle("active");
    });

    loadData();
  </script>
</body>

</html>
